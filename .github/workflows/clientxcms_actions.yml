name: ClientX CMS Actions

on:
  release:
    types:
      - published
  push:
    branches:
      - master
      - develop
      - "v2*" 
  pull_request:
    branches:
      - master
      - develop
      - "v2*"

permissions:
  contents: read
jobs:
  release-build:
    name: Build release asset
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: clientxcms_release
          MYSQL_USER: clientxcms
          MYSQL_PASSWORD: clientxcms
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: json, zip, sodium, pcntl, bcmath, pdo_mysql, dom, gd, intl, libxml, simplexml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: /tmp/composer-cache
          key: ${{ runner.os }}-composer-release-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-release-
            ${{ runner.os }}-

      - name: Install Composer dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Prepare Laravel for release
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Import translations
        run: |
          php artisan translations:import 2>&1 | tee /tmp/translations-import.log
          if grep -q "Error importing translations:" /tmp/translations-import.log; then
            exit 1
          fi

      - name: Generate SQL schema
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: clientxcms_release
          DB_USERNAME: clientxcms
          DB_PASSWORD: clientxcms
        run: |
          php artisan migrate:fresh --force --no-interaction --no-ansi
          mysqldump \
            --host="${DB_HOST}" \
            --port="${DB_PORT}" \
            --user="${DB_USERNAME}" \
            --password="${DB_PASSWORD}" \
            --no-data \
            --no-tablespaces \
            --single-transaction \
            --skip-comments \
            --skip-add-locks \
            --skip-disable-keys \
            --compact \
            "${DB_DATABASE}" > database/clientxcms.sql

      - name: Prepare release archive
        run: |
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          ARTIFACT_NAME="clientxcms-${RELEASE_TAG//\//-}.zip"
          SQL_ARTIFACT_NAME="clientxcms-${RELEASE_TAG//\//-}.sql"
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> "${GITHUB_ENV}"
          echo "SQL_ARTIFACT_NAME=${SQL_ARTIFACT_NAME}" >> "${GITHUB_ENV}"
          cp database/clientxcms.sql "${SQL_ARTIFACT_NAME}"
          mkdir -p release/clientxcms
          rsync -a ./ release/clientxcms/ \
            --exclude='.agents' \
            --exclude='.codex' \
            --exclude='.editorconfig' \
            --exclude='.git' \
            --exclude='.gitattributes' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.idea' \
            --exclude='.env' \
            --exclude='.env.testing' \
            --exclude='.phpunit.result.cache' \
            --exclude='AGENTS.md' \
            --exclude='Dockerfile' \
            --exclude='README.md' \
            --exclude='SECURITY.md' \
            --exclude='_ide_helper.php' \
            --exclude='clientxcms-worker.log' \
            --exclude='composer.phar' \
            --exclude='docker-compose.yml' \
            --exclude='docker-compose.example.yml' \
            --exclude='docs' \
            --exclude='tests' \
            --exclude='node_modules' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='phpunit.xml' \
            --exclude='phpunit_github.xml' \
            --exclude='pint.json' \
            --exclude='postcss.config.js' \
            --exclude='release' \
            --exclude="${SQL_ARTIFACT_NAME}" \
            --exclude='tailwind.config.js' \
            --exclude='vite.config.js' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/data/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*'
          cd release
          zip -r "../${ARTIFACT_NAME}" clientxcms

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clientxcms-release-assets
          if-no-files-found: error
          retention-days: 30
          path: |
            ${{ env.ARTIFACT_NAME }}
            ${{ env.SQL_ARTIFACT_NAME }}

      - name: Upload compiled release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ARTIFACT_NAME }}
            ${{ env.SQL_ARTIFACT_NAME }}

  unit-test:
    name: Unit testing
    runs-on: ubuntu-latest
    if: github.event_name != 'release'
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: testdb
          MYSQL_USER: user
          MYSQL_PASSWORD: password
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: json, zip, sodium, pcntl, bcmath, pdo_mysql

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: /tmp/composer-cache
          key: ${{ runner.os }}-${{ hashFiles('composer.lock') }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Wait for MySQL to be ready
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u root -proot --silent; then
              echo "MySQL is up!"
              break
            fi
            echo "Waiting for MySQL..."
            sleep 2
          done
      - name: Create installed flag
        run: mkdir -p storage && touch storage/installed
      - name: Set up environment
        run: cp .env.testing .env
      - name: Generate application key
        run: php artisan key:generate
      - name: Generate OpenAPI documentation
        run: php artisan l5-swagger:generate
      - name: Run migrations
        run: php artisan migrate --force --no-interaction --no-ansi --seed
      - name: Build assets
        run: npm install && npm run build
      - name: Run translations
        run: php artisan translations:import
        
      - name: Run PHPUnit
        run: ./vendor/bin/phpunit --configuration phpunit_github.xml -d date.timezone=Europe/Paris

  docker-build-push:
    name: Upload to docker
    runs-on: ubuntu-latest
    needs: unit-test
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: clientxcms/panel

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
